name: gpui-ci

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: [ "*" ]
  pull_request:
    types: [ opened, synchronize, ready_for_review ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gpui-build-container:
    uses: ./.github/workflows/build-container.yml
    secrets: inherit
    strategy:
      matrix:
        os: [ { distr: "alt:sisyphus", artifact: "sisyphus" }, { distr: "alt:p10", artifact: "p10" } ]
        architecture: [ amd64, i386 ]
    with:
      artifact: ${{ matrix.os.artifact }}
      architecture: ${{ matrix.architecture }}

  gpui-build:
    uses: ./.github/workflows/build.yml
    needs: [ gpui-build-container ]
    secrets: inherit
    strategy:
      matrix:
        os: [ { distr: "alt:sisyphus", artifact: "sisyphus" }, { distr: "alt:p10", artifact: "p10" } ]
        architecture: [ amd64, i386 ]
      fail-fast: false
    with:
      artifact: ${{ matrix.os.artifact }}
      architecture: ${{ matrix.architecture }}

  gpui-test:
    uses: ./.github/workflows/test.yml
    needs: [ gpui-build-container ]
    secrets: inherit
    strategy:
      matrix:
        cpp-compiler: [ "gcc", "clang" ]
      fail-fast: false
    with:
      artifact: "sisyphus"
      architecture: "amd64"
      cpp-compiler: ${{ matrix.cpp-compiler }}

  gpui-publish-api-docs:
    uses: ./.github/workflows/publish-api-docs.yml
    needs: [ gpui-build, gpui-test ]
    secrets: inherit
