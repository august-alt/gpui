name: gpui-test

on:
  workflow_call:
    inputs:
      artifact:
        description: "Artifact"
        type: string
        required: true
      architecture:
        description: "Architecture"
        type: string
        required: true
      cpp-compiler:
        description: "C++ compiler"
        type: "string"
        default: "gcc"

jobs:
  gpui-test:
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository }}-${{ inputs.architecture }}-${{ inputs.artifact }}:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test Clang
        if: inputs.cpp-compiler == 'clang'
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          CXX=clang++ cmake -B build -DCMAKE_BUILD_TYPE:STRING=Debug -DGPUI_BUILD_TESTS:BOOL=ON .
          cd build
          make -j `nproc`
          make test

      - name: Test GCC
        if: inputs.cpp-compiler != 'clang'
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE:STRING=Debug -DGPUI_BUILD_TESTS:BOOL=ON .
          cd build
          make -j `nproc`
          make test
