name: gpui-build-container

on:
  workflow_call:
    inputs:
      artifact:
        description: "Artifact"
        type: string
        required: true
      architecture:
        description: "Architecture"
        type: string
        required: true

jobs:
  gpui-build-container:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        if: github.ref == 'refs/heads/master'
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/master'
        run: |
          docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.github_token }}

      - name: Build container
        if: github.ref == 'refs/heads/master'
        run: |
          docker buildx build -t ghcr.io/${{ github.repository }}-${{ inputs.architecture }}-${{ inputs.artifact }}:${{ github.run_number }} \
          -t ghcr.io/${{ github.repository }}-${{ inputs.architecture }}-${{ inputs.artifact }}:latest \
          --cache-from type=gha,scope=$GITHUB_REF_NAME-${{ inputs.architecture }}-${{ inputs.artifact }}-image \
          --cache-to type=gha,mode=max,scope=$GITHUB_REF_NAME-${{ inputs.architecture }}-${{ inputs.artifact }}-image \
          --build-arg DISTR=${{ inputs.artifact }} --build-arg ARCH=${{ inputs.architecture }} \
          --build-arg USER_ID=$(id -u) --build-arg GROUP_ID=$(id -g) --platform ${{ inputs.architecture }} .

      - name: Push container
        if: github.ref == 'refs/heads/master'
        run: |
          docker push -a ghcr.io/${{ github.repository }}-${{ inputs.architecture }}-${{ inputs.artifact }}
